{{- if .Values.configMaps.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMaps.blue.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- toYaml .Values.globalLabels | nindent 4 }}
    app.kubernetes.io/component: blue-config
data:
{{ toYaml .Values.configMaps.blue.data | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMaps.green.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- toYaml .Values.globalLabels | nindent 4 }}
    app.kubernetes.io/component: green-config
data:
{{ toYaml .Values.configMaps.green.data | indent 2 }}
{{- end }}
